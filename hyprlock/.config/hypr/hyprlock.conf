general {
    hide_cursor = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    inner_color = rgba(0,0,0,0)
    outer_color = rgba(33ccffee)
    font_color = rgb(143, 143, 143)
    placeholder_text = Input password...
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 90
    font_family = Jetbrains Mono
    position = -30, 0
    halign = right
    valign = top
}   
