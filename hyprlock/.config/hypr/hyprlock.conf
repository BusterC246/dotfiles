general {
    hide_cursor = false
}

background {
    monitor =
    path = $HOME/Pictures/wallpapers/wallpaper.png
    blur_passes = 0
    blur_size = 0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 1
    inner_color = rgb(1D2021)
    outer_color = rgb(FE8019)
    font_color = rgb(EBDBB2)
    placeholder_text = Password
    position = 0, 0
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 90
    color = rgb(EBDBB2)
    font_family = Jetbrains Mono
    position = 0, 10% 
    halign = center
    valign = center
}   
