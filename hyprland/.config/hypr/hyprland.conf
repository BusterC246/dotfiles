env = CLUTTER_BACKEND, wayland
env = ELECTRON_OZONE_PLATFORM_HINT, wayland
env = ELECTRON_PLATFORM_HINT, wayland
env = ELM_DISPLAY, wl
env = GDK_BACKEND, wayland,x11,*
env = KITTY_ENABLE_WAYLAND, 1
env = LIBVA_DRIVER_NAME, radeonsi
env = MOZ_ENABLE_WAYLAND, 1
env = MOZ_WAYLAND_USE_VAAPI, 1
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1
env = QT_QPA_PLATFORM, wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = RADV_PERFTEST, video_decode
env = RUSTICL_ENABLE, radeonsi
env = SDL_VIDEODRIVER, wayland
env = VDPAU_DRIVER, radeonsi
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = _JAVA_AWT_WM_NONREPARENTING, 1

exec-once = source ~/.profile
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = mako
exec-once = wl-clip-persist --clipboard both
exec-once = /usr/libexec/hyprpolkitagent
exec-once = gentoo-pipewire-launcher
exec-once = hypridle
exec-once = wbg $(find "${XDG_PICTURES_DIR}"/wallpapers -type f | shuf -n 1)
exec-once = ./scripts/xdg-portal.sh

monitor = , preferred, auto, 1

general {
  gaps_in = 0
  gaps_out = 0
  col.active_border = rgb(FE8019)
  col.inactive_border = rgb(1D2021)

  layout = master
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
	force_default_wallpaper = 0

  vrr = 1

	allow_session_lock_restore = true

	mouse_move_enables_dpms = true
	key_press_enables_dpms = true

	enable_swallow = false
	swallow_regex = ^([aA]lacritty|[kK]itty|foot|footclient|[gG]hostty)$

  middle_click_paste = false
}

xwayland {
  use_nearest_neighbor = false
}

ecosystem {
  no_update_news = true
  no_donation_nag = true
}

debug {
  disable_logs = false
}

dwindle {
  pseudotile = true
	force_split = 2
	permanent_direction_override = true
  preserve_split = false
}

master {
  mfact = 0.5
	smart_resizing = false
  allow_small_split = true
}


decoration { 
  blur {
    enabled = false
  }

  shadow {
    enabled = false
  }
}

animations {
  enabled = false
}

input {
  kb_layout = us,us
  kb_variant = dvorak,basic
  # kb_model =
  kb_options = grp:alts_toggle,caps:escape
  # kb_rules =
  numlock_by_default = true
  
  touchpad {
    natural_scroll = true
  }

  sensitivity = 0.0 # -1.0 - 1.0, 0 means no modification.
  accel_profile = flat
  force_no_accel = false
}

# Make app runner always focused
windowrule = match:class ^(tofi), stay_focused on

# Fix Steam menus
windowrule = match:class ^(steam), match:float true, stay_focused on
windowrule = match:class ^(steam), min_size 1 1

# Disable idle on fullscreen
windowrule = match:fullscreen true, idle_inhibit focus

# Screensharing
windowrule {
    name = xwayland-video-bridge-fixes
    match:class = xwaylandvideobridge

    no_initial_focus = true
    no_focus = true
    no_anim = true
    no_blur = true
    max_size = 1 1
    opacity = 0.0
}

# Fix Ghidra
windowrule = match:class ^(ghidra), stay_focused on
windowrule = match:class ^(ghidra), min_size 1 1

# Fix IntelliJ
windowrule = match:class ^(jetbrains), float on, center on
windowrule = match:class ^(jetbrains), float on, no_focus on
windowrule = match:class ^(jetbrains), float on, border_size 0
windowrule = match:class ^(jetbrains), match:title ^(win), float on, no_focus on

$mainMod = SUPER
$term = foot
$menu = eval $(tofi-drun --font /usr/share/fonts/jetbrains-mono/JetBrainsMono-Regular.ttf --ascii-input true)
$browser = librewolf

bind = $mainMod, return, exec, $term
bind = $mainMod, A, exec, $browser
bind = $mainMod, space, exec, $menu
bind = $mainMod, W, killactive, 
bind = $mainMod SHIFT, semicolon, exit,
# bind = $mainMod, P, fakefullscreen
# bind = $mainMod, P, pseudo, # dwindle
# bind = $mainMod, J, togglesplit, # dwindle

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, T, cyclenext,
bind = $mainMod, H, cyclenext, prev
bind = $mainMod, C, workspace, e+1
bind = $mainMod, G, workspace, e-1
bind = $mainMod SHIFT, return, layoutmsg, swapwithmaster auto
bind = $mainMod, F, togglefloating

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindle = , XF86MonBrightnessUp, exec, ddcutil setvcp 10 + 15 || brightnessctl set '5%+'
bindle = , XF86MonBrightnessDown, exec, ddcutil setvcp 10 - 15 || brightnessctl set '5%-'

#bindle = , XF86MonBrightnessUp, exec, brightnessctl set '10%+'
#bindle = , XF86MonBrightnessDown, exec, brightnessctl set '10%-'

bindle = , xF86KbdBrightnessUp, exec, brightnessctl -d *::kbd_backlight set 33%+
bindle = , xF86KbdBrightnessDown, exec, brightnessctl -d *::kbd_backlight set 33%-

bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle

bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86audiostop, exec, playerctl stop

# Screenshot
bind = , Print, exec, grim -g "$(slurp -d)"
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp -d)"

source = env.conf
source = autostart.conf
source = input.conf
source = window_rules.conf
source = monitors.conf
